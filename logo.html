<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Works | Kai Shen</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Helvetica Neue',Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
padding:80px 10%;
}

/* TITLE */

h1{
text-align:center;
margin-bottom:10px;
font-size:42px;
letter-spacing:4px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:60px;
}

/* BACK */

.back{
text-align:center;
margin-bottom:60px;
}

.back a{
color:#aaa;
text-decoration:none;
border:1px solid #333;
padding:12px 30px;
font-size:13px;
transition:.4s;
}

.back a:hover{
background:white;
color:black;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:40px;
}

/* ITEM */

.item{
position:relative;
overflow:hidden;
border-radius:12px;
cursor:pointer;
}

/* IMAGE */

.item img{
width:100%;
aspect-ratio:1/1;
object-fit:contain;
background:white;
padding:40px;
transition:.6s;
}

/* HOVER EFFECT */

.item:hover img{
transform:scale(1.08);
}

/* OVERLAY TEXT */

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
background:linear-gradient(transparent,rgba(0,0,0,0.8));
color:white;
padding:20px;
opacity:0;
transition:.4s;
font-size:18px;
letter-spacing:1px;
}

.item:hover .overlay{
opacity:1;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox img{
max-width:80%;
max-height:80%;
}

/* CLOSE */

.lightbox:active{
display:none;
}

/* MOBILE */

@media(max-width:768px){
body{padding:60px 6%;}
}

</style>
</head>

<body>

<h1>Logo Works</h1>
<p class="subtitle">Brand Identity & Visual Marks</p>

<div class="back">
<a href="index.html">← Back to Home</a>
</div>

<div class="grid">

<div class="item" onclick="openLightbox(this)">
<img src="https://i.postimg.cc/5yCCndHV/logo-beitou-01.jpg">
<div class="overlay"></div>
</div>

<div class="item" onclick="openLightbox(this)">
<img src="https://i.postimg.cc/DZzQQMdn/logo-lsss-01.jpg">
<div class="overlay"></div>
</div>

<div class="item" onclick="openLightbox(this)">
<img src="https://i.postimg.cc/W34mmH6s/Untitled-1-01.jpg">
<div class="overlay"></div>
</div>

</div>

<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>

function openLightbox(element){
const img = element.querySelector("img").src;
document.getElementById("lightbox-img").src = img;
document.getElementById("lightbox").style.display="flex";
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
